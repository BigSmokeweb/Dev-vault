<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FAQ — DevVault</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.faq-hero{padding:4rem 2.5rem 3rem;background:linear-gradient(135deg,#faf5ff,#fdf8f2);border-bottom:1.5px solid var(--border);}
.faq-title{font-family:var(--font-display);font-size:clamp(2.5rem,5vw,4rem);font-weight:700;letter-spacing:-1px;margin-bottom:.75rem;}
.faq-title span{color:var(--lavender);font-style:italic;}
.faq-inner{max-width:760px;margin:0 auto;padding:3rem 2.5rem 5rem;}
.faq-cats{display:flex;gap:.5rem;margin-bottom:2.5rem;flex-wrap:wrap;}
.faq-cat{padding:.4rem 1rem;border-radius:100px;border:1.5px solid var(--border);background:var(--white);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font-body);}
.faq-cat.active,.faq-cat:hover{background:var(--lavender);color:white;border-color:var(--lavender);}
.faq-item{border:1.5px solid var(--border);border-radius:var(--radius);background:var(--white);margin-bottom:.75rem;overflow:hidden;transition:border-color .2s;}
.faq-item.open{border-color:var(--lavender);}
.faq-q{padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-weight:600;font-size:.92rem;gap:1rem;}
.faq-toggle{width:28px;height:28px;border-radius:50%;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .3s;flex-shrink:0;}
.faq-item.open .faq-toggle{background:var(--lavender);color:white;transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.faq-a-inner{padding:0 1.5rem 1.25rem;font-size:.88rem;color:var(--ink3);line-height:1.75;}
.faq-item.open .faq-a{max-height:300px;}
</style>
</head>
<body>
<div class="toast-area" id="toastArea"></div>
<nav class="navbar" id="mainNav"></nav>
<div class="faq-hero">
  <div style="max-width:760px;margin:0 auto">
    <div class="section-kicker" style="color:var(--lavender)">// Got questions?</div>
    <div class="faq-title">Frequently Asked <span>Questions</span></div>
    <p style="font-size:1rem;color:var(--ink3);line-height:1.7">Everything you need to know about DevVault. Can't find your answer? <a href="contact.html" style="color:var(--coral);font-weight:600">Contact us →</a></p>
  </div>
</div>
<div class="faq-inner">
  <div class="faq-cats">
    <span class="faq-cat active" data-cat="all">All</span>
    <span class="faq-cat" data-cat="general">General</span>
    <span class="faq-cat" data-cat="upload">Uploading</span>
    <span class="faq-cat" data-cat="download">Downloading</span>
    <span class="faq-cat" data-cat="account">Account</span>
  </div>
  <div id="faqList"></div>
</div>
<div id="footer"></div>
<script type="module">
import { onUser, renderNavbar, renderFooter, showToast, TEAM_DATA, BLOG_POSTS, TUTORIALS, TUT_PATH, FAQS } from "./js/data.js";
renderFooter("footer");
onUser(user => { renderNavbar("", user); });
renderNavbar('');
renderFooter('footer');
let activeCat = 'all';
function renderFAQ() {
  const list = activeCat==='all' ? FAQS : FAQS.filter(f=>f.cat===activeCat);
  document.getElementById('faqList').innerHTML = list.map((f,i)=>`
    <div class="faq-item" id="faq-${i}">
      <div class="faq-q" onclick="document.getElementById('faq-${i}').classList.toggle('open')">
        <span>${f.q}</span><div class="faq-toggle">+</div>
      </div>
      <div class="faq-a"><div class="faq-a-inner">${f.a}</div></div>
    </div>`).join('');
}
document.querySelectorAll('.faq-cat').forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll('.faq-cat').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); activeCat=c.dataset.cat; renderFAQ();
  };
});
renderFAQ();
</script>
</body>
</html>
