<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Project — DevVault</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.detail-back{padding:1rem 2.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;}
.back-btn{background:none;border:none;cursor:pointer;font-size:.88rem;color:var(--ink3);font-family:var(--font-body);display:flex;align-items:center;gap:.4rem;transition:color .15s;text-decoration:none;}
.back-btn:hover{color:var(--coral);}
.detail-inner{padding:3rem 2.5rem;display:grid;grid-template-columns:1fr 380px;gap:3rem;max-width:1280px;margin:0 auto;align-items:start;}
.detail-thumb{height:340px;border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--border);margin-bottom:1.5rem;}
.detail-thumb img{width:100%;height:100%;object-fit:cover;}
.detail-title{font-family:var(--font-display);font-size:2.5rem;font-weight:700;letter-spacing:-1px;margin-bottom:.75rem;}
.detail-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem;}
.detail-desc{font-size:.95rem;color:var(--ink3);line-height:1.75;margin-bottom:1.5rem;}
.detail-meta{display:flex;align-items:center;gap:1.5rem;padding:1rem 0;border-top:1px solid var(--border);}
.detail-meta-item{display:flex;align-items:center;gap:.4rem;font-size:.82rem;color:var(--ink3);}
.sidebar{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);position:sticky;top:80px;}
.sb-head{padding:1.5rem;border-bottom:1px solid var(--border);}
.sb-author{display:flex;align-items:center;gap:.8rem;margin-bottom:.75rem;}
.sb-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:white;}
.sb-name{font-weight:700;font-size:.95rem;}
.sb-role{font-size:.75rem;color:var(--muted);font-family:var(--font-mono);}
.sb-stats{display:flex;gap:1rem;}
.sb-stat{text-align:center;}
.sb-stat-n{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--coral);}
.sb-stat-l{font-size:.68rem;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;}
.sb-actions{padding:1.25rem;display:flex;flex-direction:column;gap:.6rem;}
.sb-btn{width:100%;padding:.75rem;border-radius:var(--radius-sm);font-size:.88rem;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .18s;display:flex;align-items:center;justify-content:center;gap:.4rem;border:none;}
.sb-btn-primary{background:var(--coral);color:white;}.sb-btn-primary:hover{background:var(--coral2);}
.sb-btn-secondary{background:var(--cream);color:var(--ink);border:1.5px solid var(--border)!important;}
.sb-btn-secondary:hover{border-color:var(--coral)!important;color:var(--coral);}
@media(max-width:900px){.detail-inner{grid-template-columns:1fr;}.sidebar{position:static;}}
</style>
</head>
<body>
<div class="toast-area" id="toastArea"></div>
<nav class="navbar" id="mainNav"></nav>
<div class="detail-back"><a class="back-btn" href="explore.html">← Back to Explore</a><span style="color:var(--muted);font-size:.82rem" id="breadcrumb"></span></div>
<div class="detail-inner" id="detailInner">
  <div style="text-align:center;padding:4rem;color:var(--muted);font-family:var(--font-mono)">// Loading project…</div>
</div>
<div id="footer"></div>
<script type="module">
import { onUser, getProject, getUserProjects, toggleLikeDB,
         renderNavbar, renderFooter, tagStyle, diffBadge,
         fakeDownload, showToast, COLORS, hashStr } from './js/data.js';
renderFooter('footer');
const id = new URLSearchParams(location.search).get('id');
let currentUser = null;

onUser(async user => {
  currentUser = user;
  renderNavbar('explore', user);
  if (!id) { document.getElementById('detailInner').innerHTML='<p style="padding:3rem;color:var(--muted);font-family:var(--font-mono)">// No project ID specified.</p>'; return; }
  const p = await getProject(id);
  if (!p) { document.getElementById('detailInner').innerHTML='<p style="padding:3rem;color:var(--muted);font-family:var(--font-mono)">// Project not found.</p>'; return; }
  document.title = p.title + ' — DevVault';
  document.getElementById('breadcrumb').textContent = '/ ' + p.title;
  const avColor = COLORS[Math.abs(hashStr(p.id||p.title)) % COLORS.length];
  const name = p.authorName || p.author || 'Anonymous';
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const tagsH = (p.tags||[]).map(t=>`<span class="tag ${tagStyle(t)}">${t}</span>`).join('') + `<span class="tag tag-default">${diffBadge(p.difficulty)}</span>`;
  const isLiked = user && (p.likedBy||[]).includes(user.uid);
  const allByAuthor = await getUserProjects(p.authorId||'seed');

  document.getElementById('detailInner').innerHTML = `
    <div>
      <div class="detail-thumb"><img src="${p.img||'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=600&h=340&fit=crop'}" alt="${p.title}"></div>
      <div class="detail-tags">${tagsH}</div>
      <h1 class="detail-title">${p.title}</h1>
      <p class="detail-desc">${p.desc} This project is a great reference for students building something similar. Download it, study the code, and make it your own.</p>
      <div class="detail-meta">
        <div class="detail-meta-item">♥ <strong>${p.likes||0}</strong> likes</div>
        <div class="detail-meta-item">⬇ <strong>${Math.floor((p.likes||0)*2.3)}</strong> downloads</div>
        <div class="detail-meta-item">👁️ <strong>${Math.floor((p.likes||0)*8)}</strong> views</div>
      </div>
    </div>
    <div class="sidebar">
      <div class="sb-head">
        <div class="sb-author">
          <div class="sb-avatar" style="background:${avColor}">${initials}</div>
          <div><div class="sb-name">${name}</div><div class="sb-role">// Student Developer</div></div>
        </div>
        <div class="sb-stats">
          <div class="sb-stat"><div class="sb-stat-n">${p.likes||0}</div><div class="sb-stat-l">Likes</div></div>
          <div class="sb-stat"><div class="sb-stat-n">${Math.floor((p.likes||0)*2.3)}</div><div class="sb-stat-l">Downloads</div></div>
          <div class="sb-stat"><div class="sb-stat-n">${allByAuthor.length}</div><div class="sb-stat-l">Projects</div></div>
        </div>
      </div>
      <div class="sb-actions">
        <button class="sb-btn sb-btn-primary" onclick="window.fakeDownload('${(p.title||'').replace(/'/g,"\\'")}')">⬇ Download Project</button>
        <button class="sb-btn sb-btn-secondary" id="likeBtn">${isLiked?'♥ Liked!':'♡ Like this project'}</button>
        <button class="sb-btn sb-btn-secondary" onclick="showToast('Link copied!','success')">🔗 Share</button>
      </div>
    </div>`;

  document.getElementById('likeBtn').onclick = async () => {
    if (!currentUser) { showToast('Sign in to like','error'); window.location.href='login.html'; return; }
    const nowLiked = await toggleLikeDB(id, currentUser.uid);
    document.getElementById('likeBtn').textContent = nowLiked ? '♥ Liked!' : '♡ Like this project';
    showToast(nowLiked ? 'Added to likes ♥' : 'Removed from likes', nowLiked?'success':'info');
  };
});
</script>
</body>
</html>
