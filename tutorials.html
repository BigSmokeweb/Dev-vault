<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tutorials — DevVault</title>
<link rel="stylesheet" href="css/styles.css">
<style>
.tut-hero{padding:4rem 2.5rem 3rem;background:linear-gradient(135deg,#f0fdf4,#fdf8f2);border-bottom:1.5px solid var(--border);}
.tut-title{font-family:var(--font-display);font-size:clamp(2.5rem,5vw,4rem);font-weight:700;letter-spacing:-1px;margin-bottom:.75rem;}
.tut-title span{color:var(--mint);font-style:italic;}
.tut-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;padding:3rem 2.5rem;max-width:1280px;margin:0 auto;}
.tut-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .25s;cursor:pointer;}
.tut-card:hover{border-color:var(--mint);transform:translateY(-4px);box-shadow:var(--shadow-lg);}
.tut-card-header{padding:1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border);}
.tut-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.tut-card-title{font-weight:700;font-size:.95rem;}
.tut-card-level{font-family:var(--font-mono);font-size:.68rem;color:var(--muted);}
.tut-card-body{padding:1rem 1.5rem 1.25rem;}
.tut-card-desc{font-size:.82rem;color:var(--ink3);line-height:1.65;margin-bottom:.75rem;}
.tut-progress{height:4px;background:var(--cream2);border-radius:2px;overflow:hidden;}
.tut-prog-fill{height:100%;border-radius:2px;}
.tut-card-foot{padding:.75rem 1.5rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--muted);}
.tut-path{padding:2rem 2.5rem 4rem;max-width:1280px;margin:0 auto;}
.tut-path-title{font-family:var(--font-display);font-size:1.8rem;font-weight:700;margin-bottom:1.5rem;}
.tut-path-list{display:flex;flex-direction:column;gap:.75rem;}
.tut-path-item{display:flex;align-items:center;gap:1.25rem;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;transition:all .2s;cursor:pointer;}
.tut-path-item:hover{border-color:var(--mint);}
.tut-path-num{width:36px;height:36px;border-radius:50%;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.8rem;font-weight:700;color:var(--ink3);flex-shrink:0;}
.tut-path-name{font-weight:600;font-size:.9rem;}
.tut-path-meta{font-size:.75rem;color:var(--muted);font-family:var(--font-mono);}
</style>
</head>
<body>
<div class="toast-area" id="toastArea"></div>
<nav class="navbar" id="mainNav"></nav>
<div class="tut-hero" style="max-width:100%">
  <div style="max-width:1280px;margin:0 auto">
    <div class="section-kicker" style="color:var(--mint)">// Learn step by step</div>
    <div class="tut-title">Tutorials & <span>Guides</span></div>
    <p style="font-size:1rem;color:var(--ink3);max-width:520px;line-height:1.7">Hands-on tutorials made by students who've been where you are. No fluff — just working code and clear explanations.</p>
  </div>
</div>
<div class="tut-grid" id="tutGrid"></div>
<hr class="section-divider">
<div class="tut-path">
  <div class="section-kicker">// Suggested path</div>
  <div class="tut-path-title">Your Web Dev Journey 🗺️</div>
  <div class="tut-path-list" id="tutPath"></div>
</div>
<div id="footer"></div>
<script src="js/data.js"></script>
<script>
renderNavbar('tutorials');
renderFooter('footer');
document.getElementById('tutGrid').innerHTML=TUTORIALS.map(t=>`
  <div class="tut-card" onclick="showToast('Starting: ${t.title}','info')">
    <div class="tut-card-header">
      <div class="tut-icon" style="background:${t.color}">${t.icon}</div>
      <div><div class="tut-card-title">${t.title}</div><div class="tut-card-level" style="color:${t.accent}">${t.level}</div></div>
    </div>
    <div class="tut-card-body">
      <div class="tut-card-desc">${t.desc}</div>
      <div class="tut-progress"><div class="tut-prog-fill" style="background:${t.accent};width:0%"></div></div>
    </div>
    <div class="tut-card-foot"><span>${t.lessons} lessons · ${t.time}</span><span style="color:${t.accent};font-weight:600">Start →</span></div>
  </div>`).join('');
document.getElementById('tutPath').innerHTML=TUT_PATH.map((s,i)=>`
  <div class="tut-path-item">
    <div class="tut-path-num">${i+1}</div>
    <div style="flex:1"><div class="tut-path-name">${s.name}</div><div class="tut-path-meta">${s.meta}</div></div>
    <span style="font-size:.82rem;color:var(--coral);font-weight:600">Start →</span>
  </div>`).join('');
</script>
</body>
</html>
